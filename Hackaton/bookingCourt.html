<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Lapangan | Court-Hub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm">
      <div class="container">
        <img
          src="Gambar/logobener.png"
          alt="Logo Court-Hub"
          style="width: 100px"
        />

        <a class="navbar-brand fw-bold ms-2" href="#"> CourtHub </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="home.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="bookingCourt.html">
                Booking Court
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link active" href="bookingHistory.html">
                Histoy Booking
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- HERO -->

    <section class="booking-hero">
      <div class="container text-center text-white">
        <h1 class="display-4 fw-bold">Cari Lapangan Favoritmu</h1>

        <p class="mt-3 fs-5">
          Booking venue olahraga kini lebih mudah bersama CourtHub.
        </p>
      </div>
    </section>

    <!-- FILTER OLAHRAGA -->

    <section class="container py-4">
      <div class="d-flex flex-wrap gap-2 justify-content-center">
        <button
          class="btn btn-outline-dark filter-btn active"
          data-category="All"
        >
          Semua
        </button>

        <button class="btn btn-outline-dark filter-btn" data-category="Padel">
          Padel
        </button>

        <button class="btn btn-outline-dark filter-btn" data-category="Futsal">
          Futsal
        </button>

        <button
          class="btn btn-outline-dark filter-btn"
          data-category="Badminton"
        >
          Badminton
        </button>

        <button class="btn btn-outline-dark filter-btn" data-category="Tennis">
          Tennis
        </button>

        <button class="btn btn-outline-dark filter-btn" data-category="Basket">
          Basket
        </button>

        <button
          class="btn btn-outline-dark filter-btn"
          data-category="Mini Soccer"
        >
          Mini Soccer
        </button>
      </div>
    </section>

    <!-- CARD -->

    <section class="container py-5">
      <div class="row g-4" id="venueList"></div>
    </section>

    <!-- BOOKING POP UP -->
    
    <div class="modal fade" id="bookingModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Form Booking</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="bookingForm">
              <div class="mb-3">
                <label class="form-label">Nama Venue</label>

                <input
                  type="text"
                  class="form-control"
                  id="venueName"
                  readonly
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Nama Pemesan</label>

                <input
                  type="text"
                  class="form-control"
                  id="customerName"
                  placeholder="Masukkan nama"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Tanggal Booking</label>

                <input
                  type="date"
                  class="form-control"
                  id="bookingDate"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Jam Booking</label>

                <input
                  type="time"
                  class="form-control"
                  id="bookingTime"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label">Durasi (Jam)</label>

                <select class="form-select" id="duration">
                  <option value="1">1 Jam</option>
                  <option value="2">2 Jam</option>
                  <option value="3">3 Jam</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Total Harga</label>

                <input
                  type="text"
                  class="form-control"
                  id="totalPrice"
                  readonly
                />
              </div>

              <button type="submit" class="btn btn-dark w-100 rounded-3">
                Konfirmasi Booking
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="index.js"></script>
  </body>
</html>
