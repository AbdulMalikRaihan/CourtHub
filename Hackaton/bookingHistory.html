<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>History Booking</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm">

    <div class="container">

      <img
          src="Gambar/logobener.png"
          alt="Logo Court-Hub"
          style="width: 100px"
        />

      <a class="navbar-brand fw-bold" href="#">
        CourtHub
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="home.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="bookingCourt.html">
              Booking Court
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="bookingHistory.html">
              History Booking
            </a>
          </li>

        </ul>
      </div>
    </div>
  </nav>

  <!-- TITLE -->
  <section class="container py-5">

    <h2 class="fw-bold mb-4">
      History Booking
    </h2>

    <div class="row g-4" id="historyList"></div>

  </section>

  <!-- EDIT POP UP -->
  <div class="modal fade" id="editModal" tabindex="-1">

    <div class="modal-dialog">

      <div class="modal-content rounded-4 border-0">

        <div class="modal-header">

          <h5 class="modal-title">
            Edit Booking
          </h5>

          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>

        </div>

        <div class="modal-body">

          <form id="editForm">

            <input type="hidden" id="editIndex">

            <div class="mb-3">
              <label class="form-label">
                Nama Pemesan
              </label>

              <input
                type="text"
                class="form-control"
                id="editCustomer"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                Tanggal
              </label>

              <input
                type="date"
                class="form-control"
                id="editDate"
                required
              >
            </div>

            <div class="mb-3">
              <label class="form-label">
                Jam
              </label>

              <input
                type="time"
                class="form-control"
                id="editTime"
                required
              >
            </div>

            <button
              type="submit"
              class="btn btn-dark w-100"
            >
              Save Changes
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="index.js"></script>

</body>
</html>
