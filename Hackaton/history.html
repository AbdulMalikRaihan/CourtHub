<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>History Checkout</title>

    <link rel="stylesheet"
        href="historyCheckout.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand fw-bold">
                Court-Hub
            </a>

        </div>

    </nav>

    <!-- CHECKOUT -->

    <section class="checkout-section">

        <div class="container">

            <div class="row g-5">

                <!-- LEFT -->

                <div class="col-lg-8">

                    <div class="checkout-card">

                        <button class="btn btn-outline-dark mb-4"
                            onclick="history.back()">

                                ← Kembali

                        </button>
                        <h2 class="fw-bold mb-4">
                            History Booking
                        </h2>

                        <!-- ITEM -->

                        <div class="checkout-item">

                            <img src="Gambar/homeraket.jpg"
                                class="checkout-img">

                            <div class="checkout-info">

                                <h4>
                                    Padel Arena Bekasi
                                </h4>

                                <p class="text-muted">
                                    Indoor Premium Court
                                </p>

                                <p>
                                    📅 12 Agustus 2026
                                </p>

                                <p>
                                    ⏰ 19:00 WIB
                                </p>

                            </div>

                            <div>

                                <h5 class="text-danger">
                                    Rp150.000
                                </h5>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- RIGHT -->

                <div class="col-lg-4">

                    <div class="summary-card">

                        <h3 class="fw-bold mb-4">
                            Summary
                        </h3>

                        <div class="d-flex justify-content-between mb-3">

                            <span>
                                Harga Booking
                            </span>

                            <span>
                                Rp150.000
                            </span>

                        </div>

                        <div class="d-flex justify-content-between mb-3">

                            <span>
                                Biaya Admin
                            </span>

                            <span>
                                Rp5.000
                            </span>

                        </div>

                        <hr>

                        <div class="d-flex justify-content-between">

                            <h5>Total</h5>

                            <h5 class="text-danger">
                                Rp155.000
                            </h5>

                        </div>

                        <button class="btn btn-dark w-100 mt-4">

                            Checkout Sekarang

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
